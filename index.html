<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>피드 이미지 생성기</title>
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>IDENTIFACATION CARD</h1>
    </header>

    <p class="file-warning" id="fileWarning" hidden>
      HTML 파일을 직접 열면 이미지가 로드되지 않습니다. 터미널에서
      <code>./start.sh</code> 실행 후 표시된 <code>http://localhost</code> 주소로 접속하세요.
    </p>

    <main class="main">
      <section class="preview-section">
        <div class="preview-wrap">
          <canvas id="preview" width="2048" height="2048"></canvas>
        </div>
      </section>

      <section class="controls">
        <div class="control-group">
          <label class="control-label" for="photoInput">프로필 사진</label>
          <input id="photoInput" type="file" accept="image/*" />
        </div>

        <div class="control-group">
          <label class="control-label" for="nameInput">이름</label>
          <input id="nameInput" type="text" placeholder="이름을 입력하세요" maxlength="24" />
        </div>

        <div class="control-group">
          <span class="control-label">배경</span>
          <div class="color-picker" data-target="background">
            <div class="color-picker__body">
              <canvas class="color-picker__sv" width="220" height="140" aria-label="채도와 명도"></canvas>
              <canvas class="color-picker__hue" width="18" height="140" aria-label="색상"></canvas>
            </div>
            <input
              type="text"
              class="color-hex-input"
              data-target="background"
              placeholder="#RRGGBB"
              maxlength="7"
              spellcheck="false"
              aria-label="배경 색상 코드"
            />
          </div>
          <label class="control-label control-label--sub" for="bgImageInput">배경 이미지 (선택)</label>
          <input id="bgImageInput" type="file" accept="image/*" />
          <button type="button" class="ghost-btn" id="clearBgImageBtn" hidden>배경 이미지 제거</button>
        </div>

        <div class="control-group">
          <span class="control-label">카드 프레임</span>
          <div class="color-picker" data-target="cardFrame">
            <div class="color-picker__body">
              <canvas class="color-picker__sv" width="220" height="140" aria-label="채도와 명도"></canvas>
              <canvas class="color-picker__hue" width="18" height="140" aria-label="색상"></canvas>
            </div>
            <input
              type="text"
              class="color-hex-input"
              data-target="cardFrame"
              placeholder="#RRGGBB"
              maxlength="7"
              spellcheck="false"
              aria-label="카드 프레임 색상 코드"
            />
          </div>
        </div>

        <div class="control-group">
          <span class="control-label">텍스트</span>
          <div class="color-picker" data-target="textField">
            <div class="color-picker__body">
              <canvas class="color-picker__sv" width="220" height="140" aria-label="채도와 명도"></canvas>
              <canvas class="color-picker__hue" width="18" height="140" aria-label="색상"></canvas>
            </div>
            <input
              type="text"
              class="color-hex-input"
              data-target="textField"
              placeholder="#RRGGBB"
              maxlength="7"
              spellcheck="false"
              aria-label="텍스트 색상 코드"
            />
          </div>
        </div>

        <div class="control-group">
          <span class="control-label">투자사 선택</span>
          <div class="company-tabs" id="companyTabs">
            <button type="button" class="company-tab" data-company="ap">APEX</button>
            <button type="button" class="company-tab" data-company="np">NEXTPLAY</button>
            <button type="button" class="company-tab" data-company="qm">Quantum Music</button>
          </div>
        </div>

        <button type="button" class="download-btn" id="downloadBtn">PNG로 다운로드</button>
      </section>
    </main>
  </div>

  <script src="app.js?v=12"></script>
</body>
</html>
